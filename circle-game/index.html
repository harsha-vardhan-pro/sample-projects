<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfect Circle Game</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    color: white;
}

.game {
    text-align: center;
}

/* TARGET */
.target {
    width: 200px;
    height: 200px;
    border: 3px dashed #00ffd5;
    border-radius: 50%;
    margin: 20px auto;
}

/* CIRCLE */
.circle {
    width: 20px;
    height: 20px;
    background: #00ffd5;
    border-radius: 50%;
    margin: 0 auto;
}

/* BUTTONS */
button {
    padding: 10px 20px;
    margin: 8px;
    background: #00ffd5;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: white;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="game">

    <h2>Perfect Circle Game</h2>

    <div class="target"></div>
    <div id="circle" class="circle"></div>

    <div>
        <button onclick="startGame()">Start</button>
        <button onclick="stopGame()">Stop</button>
        <button onclick="restartGame()">Try Again</button>
    </div>

    <div class="result" id="result">Try to match the circle!</div>

</div>

<script>
let circle = document.getElementById("circle");
let interval;
let size = 20;
let targetSize = 200;

/* START GAME */
function startGame() {
    clearInterval(interval);

    size = 20;
    updateCircle();

    interval = setInterval(() => {
        size += 2;
        updateCircle();
    }, 20);

    document.getElementById("result").innerText = "Growing... press STOP!";
}

/* STOP GAME */
function stopGame() {
    clearInterval(interval);

    let accuracy = Math.max(0, 100 - Math.abs(targetSize - size));

    let message = "";

    if (accuracy > 90) {
        message = "🔥 Perfect!";
    } else if (accuracy > 70) {
        message = "👍 Good!";
    } else {
        message = "😅 Try Again!";
    }

    document.getElementById("result").innerText =
        message + " Accuracy: " + accuracy + "%";
}

/* RESTART GAME */
function restartGame() {
    clearInterval(interval);

    size = 20;
    updateCircle();

    document.getElementById("result").innerText = "Game reset. Press Start!";
}

/* UPDATE CIRCLE */
function updateCircle() {
    circle.style.width = size + "px";
    circle.style.height = size + "px";
}
</script>

</body>
</html>
