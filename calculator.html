<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    background-image: url('https://img.freepik.com/premium-photo/two-schoolkids-learning_1376230-181.jpg?semt=ais_hybrid&w=740&q=80');
    background-size: cover;
    background-position: center;
}

/* CONTAINER */
.container {
    display: flex;
    gap: 20px;
}

/* CALCULATOR */
.calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    width: 300px;
}

/* DISPLAY */
.display {
    width: 100%;
    height: 60px;
    background: black;
    color: #00ffd5;
    font-size: 28px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* HISTORY */
.history {
    height: 80px;
    overflow-y: auto;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
}

/* BUTTONS */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00ffd5;
    color: black;
}

.equal {
    grid-column: span 2;
    background: #00ffd5;
    color: black;
}

.clear {
    background: red;
}

/* THEME TOGGLE */
.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    color: #00ffd5;
}

/* LIGHT MODE */
.light {
    background: white;
    color: black;
}

.light .calculator {
    background: #f0f0f0;
}

.light .display {
    background: #ddd;
    color: black;
}
</style>
</head>

<body>

<div class="container">

    <div class="calculator">

        <div id="history" class="history"></div>
        <div id="display" class="display">0</div>

        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="append('%')">%</button>
            <button onclick="append('/')">/</button>
            <button onclick="append('*')">*</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('-')">-</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('+')">+</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calculate()">=</button>

            <button onclick="append('0')" class="equal">0</button>
            <button onclick="append('.')">.</button>
        </div>

        <div class="toggle" onclick="toggleTheme()">Toggle Theme</div>

    </div>

</div>

<script>
let display = document.getElementById("display");
let historyBox = document.getElementById("history");

/* ADD VALUES */
function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

/* CLEAR */
function clearDisplay() {
    display.innerText = "0";
}

/* CALCULATE */
function calculate() {
    try {
        let result = eval(display.innerText);
        historyBox.innerHTML += display.innerText + " = " + result + "<br>";
        display.innerText = result;
    } catch {
        display.innerText = "Error";
    }
}

/* THEME TOGGLE */
function toggleTheme() {
    document.body.classList.toggle("light");
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown", function(e) {
    if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
        append(e.key);
    }
    if (e.key === "Enter") calculate();
    if (e.key === "Backspace") {
        display.innerText = display.innerText.slice(0, -1) || "0";
    }
});
</script>

</body>
</html>
